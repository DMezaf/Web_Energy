<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder mantenimiento y riesgos</title>
  <desc id="desc">Placeholder visual para seccion de riesgos y mantenimiento de tableros de distribucion.</desc>
  <rect width="1400" height="900" fill="#f8fbfe"/>
  <rect x="84" y="84" width="1232" height="732" rx="30" fill="#ffffff" stroke="#d6e2ef" stroke-width="3"/>
  <text x="120" y="150" fill="#12365f" font-family="Arial, sans-serif" font-size="42" font-weight="700">Mantenimiento y control de riesgos</text>
  <g transform="translate(120 220)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="520" height="470" rx="28" fill="#12365f"/>
    <text x="42" y="64" fill="#ffffff" font-size="30" font-weight="700">Riesgos frecuentes</text>
    <g fill="#d7e9fb" font-size="24">
      <text x="42" y="130">• Sobrecalentamiento</text>
      <text x="42" y="184">• Disparos intempestivos</text>
      <text x="42" y="238">• Falla de protecciones</text>
      <text x="42" y="292">• Perdida de continuidad</text>
      <text x="42" y="346">• Expansion complicada</text>
    </g>
    <rect x="610" y="0" width="550" height="470" rx="28" fill="#edf6ff" stroke="#b8d4eb" stroke-width="3"/>
    <text x="650" y="64" fill="#12365f" font-size="30" font-weight="700">Acciones de mantenimiento</text>
    <g>
      <rect x="650" y="108" width="470" height="60" rx="14" fill="#ffffff"/>
      <rect x="650" y="190" width="470" height="60" rx="14" fill="#ffffff"/>
      <rect x="650" y="272" width="470" height="60" rx="14" fill="#ffffff"/>
      <rect x="650" y="354" width="470" height="60" rx="14" fill="#ffffff"/>
      <circle cx="684" cy="138" r="12" fill="#0f4c81"/>
      <circle cx="684" cy="220" r="12" fill="#0f4c81"/>
      <circle cx="684" cy="302" r="12" fill="#0f4c81"/>
      <circle cx="684" cy="384" r="12" fill="#0f4c81"/>
      <text x="714" y="146" fill="#314a67" font-size="24">Inspeccion visual y termica</text>
      <text x="714" y="228" fill="#314a67" font-size="24">Prueba de protecciones</text>
      <text x="714" y="310" fill="#314a67" font-size="24">Ajuste y torqueo programado</text>
      <text x="714" y="392" fill="#314a67" font-size="24">Limpieza y registros de condicion</text>
    </g>
  </g>
  <text x="120" y="770" fill="#5e7692" font-family="Arial, sans-serif" font-size="24">Uso sugerido: seccion "Riesgos de un tablero mal seleccionado o mal mantenido".</text>
</svg>
