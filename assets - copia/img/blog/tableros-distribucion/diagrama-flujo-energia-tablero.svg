<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder diagrama flujo de energia</title>
  <desc id="desc">Diagrama de placeholder para flujo de energia desde acometida hasta cargas industriales.</desc>
  <rect width="1400" height="900" fill="#f4f8fc"/>
  <rect x="70" y="70" width="1260" height="760" rx="32" fill="#ffffff" stroke="#d6e2ef" stroke-width="3"/>
  <text x="110" y="142" fill="#12365f" font-family="Arial, sans-serif" font-size="40" font-weight="700">Flujo de energia en un sistema industrial</text>
  <text x="110" y="188" fill="#56708e" font-family="Arial, sans-serif" font-size="24">Placeholder para diagrama explicativo dentro del articulo</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="120" y="300" width="220" height="180" rx="24" fill="#12365f"/>
    <text x="230" y="382" fill="#ffffff" font-size="32" font-weight="700">Fuente</text>
    <text x="230" y="420" fill="#d7e9fb" font-size="24">Subestacion</text>
    <rect x="470" y="300" width="220" height="180" rx="24" fill="#0f4c81"/>
    <text x="580" y="382" fill="#ffffff" font-size="32" font-weight="700">Tablero</text>
    <text x="580" y="420" fill="#d7e9fb" font-size="24">Distribucion</text>
    <rect x="820" y="230" width="220" height="120" rx="22" fill="#dfeefb"/>
    <text x="930" y="300" fill="#12365f" font-size="28" font-weight="700">Motores</text>
    <rect x="820" y="390" width="220" height="120" rx="22" fill="#dfeefb"/>
    <text x="930" y="460" fill="#12365f" font-size="28" font-weight="700">Iluminacion</text>
    <rect x="820" y="550" width="220" height="120" rx="22" fill="#dfeefb"/>
    <text x="930" y="620" fill="#12365f" font-size="28" font-weight="700">Control</text>
    <rect x="1110" y="390" width="150" height="120" rx="22" fill="#edf6ff" stroke="#aacdee" stroke-width="2"/>
    <text x="1185" y="460" fill="#12365f" font-size="24" font-weight="700">Cargas</text>
  </g>
  <g stroke="#4aa3ff" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M340 390 L470 390"/>
    <path d="M690 390 L780 390"/>
    <path d="M780 390 L780 290 L820 290"/>
    <path d="M780 390 L820 450"/>
    <path d="M780 390 L780 610 L820 610"/>
    <path d="M1040 450 L1110 450"/>
  </g>
  <text x="110" y="760" fill="#5e7692" font-family="Arial, sans-serif" font-size="24">Uso sugerido: seccion "Funciones principales de un tablero de distribucion".</text>
</svg>
