<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder criterios de seleccion</title>
  <desc id="desc">Placeholder tipo infografia para criterios de seleccion de tableros de distribucion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6fc"/>
      <stop offset="100%" stop-color="#dcebf8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="100" y="128" fill="#12365f" font-family="Arial, sans-serif" font-size="42" font-weight="700">Criterios de seleccion</text>
  <text x="100" y="172" fill="#56708e" font-family="Arial, sans-serif" font-size="24">Placeholder para apoyo visual de la tabla comparativa</text>
  <g transform="translate(100 230)" font-family="Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="360" height="180" rx="26" fill="#12365f"/>
      <text x="36" y="64" fill="#ffffff" font-size="28" font-weight="700">Nivel de tension</text>
      <text x="36" y="106" fill="#d7e9fb" font-size="22">Baja o media tension</text>
    </g>
    <g>
      <rect x="420" y="0" width="360" height="180" rx="26" fill="#0f4c81"/>
      <text x="36" y="64" transform="translate(420 0)" fill="#ffffff" font-size="28" font-weight="700">Corriente nominal</text>
      <text x="36" y="106" transform="translate(420 0)" fill="#d7e9fb" font-size="22">Carga actual y futura</text>
    </g>
    <g>
      <rect x="840" y="0" width="360" height="180" rx="26" fill="#3a6fa5"/>
      <text x="36" y="64" transform="translate(840 0)" fill="#ffffff" font-size="28" font-weight="700">Cortocircuito</text>
      <text x="36" y="106" transform="translate(840 0)" fill="#edf6ff" font-size="22">Nivel de falla esperado</text>
    </g>
    <g>
      <rect x="0" y="230" width="360" height="180" rx="26" fill="#ffffff" stroke="#bcd3e9" stroke-width="3"/>
      <text x="36" y="294" fill="#12365f" font-size="28" font-weight="700">Tipo de carga</text>
      <text x="36" y="336" fill="#4f6885" font-size="22">Motores, control, servicios</text>
    </g>
    <g>
      <rect x="420" y="230" width="360" height="180" rx="26" fill="#ffffff" stroke="#bcd3e9" stroke-width="3"/>
      <text x="456" y="294" fill="#12365f" font-size="28" font-weight="700">Ambiente</text>
      <text x="456" y="336" fill="#4f6885" font-size="22">Polvo, humedad, corrosion</text>
    </g>
    <g>
      <rect x="840" y="230" width="360" height="180" rx="26" fill="#ffffff" stroke="#bcd3e9" stroke-width="3"/>
      <text x="876" y="294" fill="#12365f" font-size="28" font-weight="700">Expansion futura</text>
      <text x="876" y="336" fill="#4f6885" font-size="22">Reserva y modularidad</text>
    </g>
  </g>
  <text x="100" y="790" fill="#5e7692" font-family="Arial, sans-serif" font-size="24">Uso sugerido: arriba o debajo de la tabla de seleccion.</text>
</svg>
