<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Grid de Servicios Eléctricos — 3×2</title>
  <desc>Grid con 6 tarjetas: Termografía, Resistencia aislamiento, Factor de potencia, Análisis aceite, Resistencia contactos, Tierra IEEE 80</desc>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F9FF"/>

  <!-- ── FILA 1 ── -->

  <!-- Card 1: Termografía -->
  <rect x="40" y="36" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <!-- badge -->
  <rect x="314" y="50" width="70" height="22" rx="11" fill="#3A6FA5"/>
  <text x="349" y="65" text-anchor="middle" font-size="14" fill="white" font-weight="600">ISO 9001</text>
  <!-- icon: thermometer -->
  <g transform="translate(220,150) scale(3)">
    <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" fill="#e8f1fa" stroke="#0F4C81" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-8" x2="0" y2="-3" stroke="#0F4C81" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- title -->
  <text x="220" y="245" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Termografía</text>
  <!-- desc -->
  <text x="220" y="272" text-anchor="middle" font-size="17" fill="#5a7a9a">Cámara IR + mapa térmico</text>

  <!-- Card 2: Resistencia aislamiento -->
  <rect x="420" y="36" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <rect x="628" y="50" width="134" height="22" rx="11" fill="#3A6FA5"/>
  <text x="695" y="65" text-anchor="middle" font-size="14" fill="white" font-weight="600">IEEE 43</text>
  <!-- icon: gauge -->
  <g transform="translate(600,155)">
    <path d="M-52 26a55 55 0 1 1 104 0" fill="none" stroke="#e8f1fa" stroke-width="12" stroke-linecap="round"/>
    <path d="M-52 26a55 55 0 0 1 95-34" fill="none" stroke="#0F4C81" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="26" r="6" fill="#0F4C81"/>
    <line x1="0" y1="26" x2="22" y2="-12" stroke="#0F4C81" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="600" y="245" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Resistencia aislamiento</text>
  <text x="600" y="272" text-anchor="middle" font-size="17" fill="#5a7a9a">Megger digital + curva DAR</text>

  <!-- Card 3: Factor de potencia -->
  <rect x="800" y="36" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <rect x="988" y="50" width="126" height="22" rx="11" fill="#3A6FA5"/>
  <text x="1051" y="65" text-anchor="middle" font-size="14" fill="white" font-weight="600">IEEE 62</text>
  <!-- icon: zap lightning -->
  <g transform="translate(980,152)">
    <polygon points="16,-60 -36,14 12,14 -14,62 62,-10 14,-10 16,-60" fill="#e8f1fa" stroke="#0F4C81" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="980" y="245" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Factor de potencia</text>
  <text x="980" y="272" text-anchor="middle" font-size="17" fill="#5a7a9a">Equipo M4100/M4000 + transformador</text>

  <!-- ── FILA 2 ── -->

  <!-- Card 4: Análisis aceite -->
  <rect x="40" y="348" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <rect x="270" y="362" width="114" height="22" rx="11" fill="#3A6FA5"/>
  <text x="327" y="377" text-anchor="middle" font-size="14" fill="white" font-weight="600">ASTM D3612</text>
  <!-- icon: flask -->
  <g transform="translate(220,462)">
    <path d="M-20,-60 L-20,-10 L-50,40 Q-56,54 -44,60 L44,60 Q56,54 50,40 L20,-10 L20,-60" fill="#e8f1fa" stroke="#0F4C81" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-20" y1="-60" x2="20" y2="-60" stroke="#0F4C81" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-42" y1="20" x2="42" y2="20" stroke="#0F4C81" stroke-width="3" stroke-dasharray="8 5" stroke-linecap="round"/>
    <circle cx="-10" cy="40" r="5" fill="#3A6FA5"/>
    <circle cx="14" cy="30" r="4" fill="#3A6FA5" opacity="0.6"/>
  </g>
  <text x="220" y="555" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Análisis de aceite</text>
  <text x="220" y="582" text-anchor="middle" font-size="17" fill="#5a7a9a">Tubo ensayo + gráfica DGA</text>

  <!-- Card 5: Resistencia contactos -->
  <rect x="420" y="348" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <rect x="590" y="362" width="162" height="22" rx="11" fill="#3A6FA5"/>
  <text x="671" y="377" text-anchor="middle" font-size="14" fill="white" font-weight="600">IEC 62271</text>
  <!-- icon: link chain -->
  <g transform="translate(600,462)">
    <path d="M14,-28 Q34,-28 34,-8 Q34,8 14,8 L-2,8" fill="none" stroke="#0F4C81" stroke-width="7" stroke-linecap="round"/>
    <path d="M-14,28 Q-34,28 -34,8 Q-34,-8 -14,-8 L2,-8" fill="none" stroke="#0F4C81" stroke-width="7" stroke-linecap="round"/>
    <rect x="-26" y="-8" width="52" height="16" rx="8" fill="#e8f1fa" stroke="#0F4C81" stroke-width="5"/>
  </g>
  <text x="600" y="555" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Resistencia de contactos</text>
  <text x="600" y="582" text-anchor="middle" font-size="17" fill="#5a7a9a">Equipo DLRO 600 A + interruptor</text>

  <!-- Card 6: Tierra IEEE 80 -->
  <rect x="800" y="348" width="360" height="291" rx="10" fill="white" stroke="#d6e6f7" stroke-width="1"/>
  <rect x="970" y="362" width="154" height="22" rx="11" fill="#3A6FA5"/>
  <text x="1047" y="377" text-anchor="middle" font-size="14" fill="white" font-weight="600">IEEE 80</text>
  <!-- icon: network/mesh -->
  <g transform="translate(980,462)">
    <circle cx="0" cy="-52" r="10" fill="#0F4C81"/>
    <circle cx="-50" cy="36" r="10" fill="#0F4C81"/>
    <circle cx="50" cy="36" r="10" fill="#0F4C81"/>
    <circle cx="0" cy="0" r="9" fill="#e8f1fa" stroke="#0F4C81" stroke-width="4"/>
    <line x1="0" y1="-42" x2="0" y2="-9" stroke="#0F4C81" stroke-width="3.5"/>
    <line x1="-6" y1="7" x2="-42" y2="28" stroke="#0F4C81" stroke-width="3.5"/>
    <line x1="6" y1="7" x2="42" y2="28" stroke="#0F4C81" stroke-width="3.5"/>
    <line x1="-40" y1="36" x2="40" y2="36" stroke="#0F4C81" stroke-width="3.5"/>
  </g>
  <text x="980" y="555" text-anchor="middle" font-size="22" font-weight="700" fill="#0F4C81">Tierra IEEE 80</text>
  <text x="980" y="582" text-anchor="middle" font-size="17" fill="#5a7a9a">Pinza de tierra + malla geométrica</text>

</svg>
