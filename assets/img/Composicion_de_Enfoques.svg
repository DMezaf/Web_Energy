<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto Condensed', system-ui, sans-serif">
  <title>Composición de Enfoques — Predictivo, Preventivo, Correctivo</title>
  <desc>Infográfico comparando tres estrategias de mantenimiento industrial</desc>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7FBFF"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Vertical dividers -->
  <line x1="400" y1="60" x2="400" y2="590" stroke="#D8E0EC" stroke-width="1"/>
  <line x1="800" y1="60" x2="800" y2="590" stroke="#D8E0EC" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════
       COLUMN 1 — PREDICTIVO (#0F4C81)
       center x = 200
  ═══════════════════════════════════════════ -->

  <!-- Icon: Activity waveform + dot -->
  <g transform="translate(200, 148)" stroke="#0F4C81" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="-88,0 -52,0 -26,50 26,-50 52,0 88,0" transform="scale(0.85)"/>
    <circle cx="0" cy="0" r="10" fill="#0F4C81" stroke="none"/>
  </g>

  <!-- Tag: Anticipa -->
  <rect x="130" y="202" width="140" height="34" rx="17" fill="#0F4C81"/>
  <text x="200" y="224" text-anchor="middle" font-size="18" font-weight="600" fill="white" letter-spacing="2">ANTICIPA</text>

  <!-- Title -->
  <text x="200" y="288" text-anchor="middle" font-size="38" font-weight="700" fill="#0F4C81" letter-spacing="3">PREDICTIVO</text>

  <!-- Bullets -->
  <circle cx="80" cy="335" r="4" fill="#0F4C81"/>
  <text x="98" y="341" font-size="22" font-weight="400" fill="#4A5F79">Monitoreo continuo</text>
  <circle cx="80" cy="378" r="4" fill="#0F4C81"/>
  <text x="98" y="384" font-size="22" font-weight="400" fill="#4A5F79">Datos en línea</text>
  <circle cx="80" cy="421" r="4" fill="#0F4C81"/>
  <text x="98" y="427" font-size="22" font-weight="400" fill="#4A5F79">Bajo riesgo</text>

  <!-- ═══════════════════════════════════════════
       COLUMN 2 — PREVENTIVO (#3A6FA5)
       center x = 600
  ═══════════════════════════════════════════ -->

  <!-- Icon: Calendar + checkmark -->
  <g transform="translate(600, 130)" stroke="#3A6FA5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="-44" y="-30" width="88" height="76" rx="6"/>
    <line x1="-22" y1="-42" x2="-22" y2="-24"/>
    <line x1="22" y1="-42" x2="22" y2="-24"/>
    <line x1="-44" y1="-10" x2="44" y2="-10"/>
    <polyline points="-16,18 -4,30 20,6" stroke-width="5"/>
  </g>

  <!-- Tag: Programado -->
  <rect x="510" y="202" width="180" height="34" rx="17" fill="#3A6FA5"/>
  <text x="600" y="224" text-anchor="middle" font-size="18" font-weight="600" fill="white" letter-spacing="2">PROGRAMADO</text>

  <!-- Title -->
  <text x="600" y="288" text-anchor="middle" font-size="38" font-weight="700" fill="#3A6FA5" letter-spacing="3">PREVENTIVO</text>

  <!-- Bullets -->
  <circle cx="480" cy="335" r="4" fill="#3A6FA5"/>
  <text x="498" y="341" font-size="22" font-weight="400" fill="#4A5F79">Ciclos fijos</text>
  <circle cx="480" cy="378" r="4" fill="#3A6FA5"/>
  <text x="498" y="384" font-size="22" font-weight="400" fill="#4A5F79">Paro planeado</text>
  <circle cx="480" cy="421" r="4" fill="#3A6FA5"/>
  <text x="498" y="427" font-size="22" font-weight="400" fill="#4A5F79">Riesgo medio</text>

  <!-- ═══════════════════════════════════════════
       COLUMN 3 — CORRECTIVO (#B54708)
       center x = 1000
  ═══════════════════════════════════════════ -->

  <!-- Icon: Alert triangle -->
  <g transform="translate(1000, 138)" stroke="#B54708" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M0,-58 L-52,28 L52,28 Z"/>
    <line x1="0" y1="-28" x2="0" y2="6"/>
    <circle cx="0" cy="18" r="3.5" fill="#B54708" stroke="none"/>
  </g>
  <!-- Wrench (bottom-right of triangle) -->
  <g transform="translate(1042, 155) rotate(-40)" stroke="#B54708" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M0,-18 a18,18 0 1,1 18,18 l-6,-6 L-22,28 a7,7 0 1,1-10-10 L0,-14z" fill="#fff8f5"/>
  </g>

  <!-- Tag: Reactivo -->
  <rect x="918" y="202" width="164" height="34" rx="17" fill="#B54708"/>
  <text x="1000" y="224" text-anchor="middle" font-size="18" font-weight="600" fill="white" letter-spacing="2">REACTIVO</text>

  <!-- Title -->
  <text x="1000" y="288" text-anchor="middle" font-size="38" font-weight="700" fill="#B54708" letter-spacing="3">CORRECTIVO</text>

  <!-- Bullets -->
  <circle cx="880" cy="335" r="4" fill="#B54708"/>
  <text x="898" y="341" font-size="22" font-weight="400" fill="#4A5F79">Post-falla</text>
  <circle cx="880" cy="378" r="4" fill="#B54708"/>
  <text x="898" y="384" font-size="22" font-weight="400" fill="#4A5F79">Emergencia</text>
  <circle cx="880" cy="421" r="4" fill="#B54708"/>
  <text x="898" y="427" font-size="22" font-weight="400" fill="#4A5F79">Alto costo</text>

  <!-- Footer -->
  <text x="600" y="630" text-anchor="middle" font-size="17" font-weight="400" fill="#7A92A8" letter-spacing=".5">
    Los tres enfoques son complementarios — Empezar por correctivo es el camino más caro.
  </text>

</svg>
