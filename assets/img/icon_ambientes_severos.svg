<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Gear ring -->
  <circle cx="36" cy="42" r="15" fill="none" stroke="#0f3d5e" stroke-width="2.4"/>
  <!-- Gear hub -->
  <circle cx="36" cy="42" r="6" fill="none" stroke="#0f3d5e" stroke-width="2"/>
  <!-- Gear teeth -->
  <g stroke="#0f3d5e" stroke-width="2.4" stroke-linecap="round">
    <line x1="36" y1="21" x2="36" y2="15"/>
    <line x1="36" y1="63" x2="36" y2="69"/>
    <line x1="15" y1="42" x2="9"  y2="42"/>
    <line x1="57" y1="42" x2="63" y2="42"/>
    <line x1="21.4" y1="27.4" x2="17.2" y2="23.2"/>
    <line x1="50.6" y1="56.6" x2="54.8" y2="60.8"/>
    <line x1="50.6" y1="27.4" x2="54.8" y2="23.2"/>
    <line x1="21.4" y1="56.6" x2="17.2" y2="60.8"/>
  </g>
  <!-- Water drop (lime) -->
  <path d="M62,22 Q68,12 74,22 A6,6 0 0,1 62,22Z" fill="#9ce37b"/>
  <!-- Dust particles -->
  <circle cx="10" cy="24" r="2.2" fill="#0f3d5e" opacity="0.45"/>
  <circle cx="6"  cy="36" r="1.7" fill="#0f3d5e" opacity="0.35"/>
  <circle cx="14" cy="60" r="2"   fill="#0f3d5e" opacity="0.4"/>
  <circle cx="68" cy="58" r="2"   fill="#9ce37b" opacity="0.6"/>
  <!-- Altitude wave -->
  <path d="M4,70 Q14,60 24,70 Q34,80 44,70" fill="none" stroke="#0f3d5e" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
</svg>
